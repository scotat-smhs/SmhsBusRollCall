<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海星校車點名系統</title>
</head>
<body class="gray-bg">
    <div id="app">
        <!-- Login View -->
        <section id="login-view" class="view">
            <div class="card login-card">
                <div class="h-stack">
                    <div class="v-stack">    
                        <h1>糾察人員登入</h1>
                        <p class="subtitle">進入點名掃描系統</p>
                    </div>
                    <button class="icon-btn theme-toggle">
                        <span class="material-symbols-outlined theme-icon">moon_stars</span>
                    </button>
                </div>
                    <div class="form-group">
                    <label>使用者名稱</label>
                    <input class="form" type="text" id="username" placeholder="請輸入使用者名稱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input class="form" type="password" id="password" placeholder="請輸入密碼">
                </div>
                <a id="forgot-password">忘記密碼？</a>
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                    <button id="login-btn" class="primary-btn">登入</button>
                    <button id="show-register-btn" class="secondary-btn">註冊新帳號</button>
                </div>
                <p id="login-error" class="error-text"></p>
            </div>
        </section>

        <!-- Register Modal -->
        <div id="register-modal" class="modal" style="display: none;">
            <div class="register-content modal-content">
                <div class="modal-header">
                    <button id="close-register" class="text-btn">取消</button>
                    <h3>註冊新帳號</h3>
                </div>
                <div class="v-stack" style="padding: 20px; gap: 15px;">
                    <div class="form-group">
                        <label>顯示名稱 (如: 王小明)</label>
                        <input class="form" type="text" id="reg-name" placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>使用者名稱 (登入時輸入,全英文小寫與數字)</label>
                        <input class="form" type="text" id="reg-username" placeholder="請輸入使用者名稱">
                    </div>
                    <div class="form-group">
                        <label>密碼</label>
                        <input class="form" type="password" id="reg-password" placeholder="請輸入密碼">
                    </div>
                    <div class="form-group">
                        <label>確認密碼</label>
                        <input class="form" type="password" id="reg-password-check" placeholder="請再次輸入密碼">
                    </div>
                    <div class="form-group">
                        <label>申請角色</label>
                        <select class="form" id="reg-type">
                            <option value="user">使用者 (糾察隊員)</option>
                            <option value="admin">管理員 (糾察幹部)</option>
                        </select>
                    </div>
                    <button id="register-submit-btn" class="primary-btn">提交申請</button>
                    <p id="register-error" class="error-text"></p>
                </div>
            </div>
        </div>

        <!-- Main View (Scanner) -->
        <section id="main-view" class="view" style="display: none;">
            <header class="glass-header">
                <div class="header-top">
                    <button id="disconnect-btn" class="icon-btn">
                        <span id="disconnect-img" class="material-symbols-outlined">logout</span>
                    </button>
                    <div class="connection-status">
                        <div id="status-dot" class="dot disconnected"></div>
                        <span id="status-text">未連接</span>
                    </div>
                    <div id="timeslot-display" class="timeslot-info" style="color: var(--primary); font-weight: 600;">
                        <span id="timeslot-text">--:--</span>
                    </div>
                    <div id="battery-info" class="battery-info" style="display: flex;">
                        <span id="battery-symbol" class="material-symbols-outlined">battery_full</span>
                        <span id="battery-level">--</span>%
                    </div>
                    <button class="icon-btn theme-toggle">
                        <span class="material-symbols-outlined theme-icon">moon_stars</span>
                    </button>
                </div>
                
                <div class="bus-selector-container">
                    <label>目標車次:</label>
                    <select id="bus-select">
                        <option value="">請選擇車次</option>
                    </select>
                </div>
            </header>

            <main class="content">
                <!-- Ready State -->
                <div id="ready-state" class="empty-state">
                    <div class="rfid-icon">
                        <span class="material-symbols-outlined">sensors</span>
                    </div>
                    <h2>準備掃描</h2>
                    <p>請將卡片靠近掃描器</p>
                    <button id="connect-ble-btn" class="primary-btn pulse">連接掃描器</button>
                    <div id="status-message-ready" class="status-message" style="margin-top: 20px; color: red;"></div>
                </div>

                <!-- Student Card -->
                <div id="student-card" class="student-card" style="display: none;">
                    <div class="photo-container">
                        <img id="student-photo" src="">
                        <div id="photo-loading" class="spinner" style="display: none;"></div>
                    </div>
                    <div class="student-details">
                        <h2 class="content-text" id="student-name">--</h2>
                        <div class="detail-row">
                            <span class="content-text">學號:</span>
                            <strong class="content-text" id="student-badge">--</strong>
                        </div>
                        <div class="detail-row">
                            <span class="content-text">班級:</span>
                            <strong class="content-text" id="student-class">--</strong>
                        </div>
                        <div class="detail-row">
                            <span class="content-text"># UID:</span>
                            <strong class="content-text" id="student-uid">--</strong>
                        </div>
                        <div id="student-bus" class="bus-badge">--</div>
                    </div>
                    
                    <div id="status-message" class="status-message"></div>
                </div>
            </main>

            <!-- Bottom Action -->
            <footer id="sync-footer" style="display: none;">
                <button id="review-btn" class="sync-btn">
                    <span class="material-symbols-outlined">list_alt</span>
                    <span>預覽與同步</span>
                    <span id="pending-count" class="badge-count">0</span>
                </button>
            </footer>
        </section>

        <!-- Review Sheet (Modal) -->
        <div id="review-sheet" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <button id="close-review" class="text-btn">取消</button>
                    <h3>點名記錄預覽</h3>
                    <div class="review-bus-selector">
                        <select id="review-bus-select">
                            <option>請選擇車次</option>
                        </select>
                    </div>
                </div>
                <div id="review-summary" class="review-summary">
                    <!-- Summary text will be injected here -->
                </div>
                <div id="review-list" class="review-list">
                    <!-- Pending scans list -->
                </div>
                <div class="modal-footer h-stack">
                    <button id="sync-now-btn" class="primary-btn success">
                        確認並上傳至伺服器
                    </button>
                    <button class="icon-btn">
                        <span id="delete-all-btn" class="material-symbols-outlined" style="color: var(--error); padding: 20px;">delete</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>正在取得學生資料...</p>
        </div>
    </div>

    <!-- Popout Box -->
    <div id="the-popout" class="darken-back">
        <div class="popout-box">
            <div class="v-stack" style="width: 100%; gap: 10px;">
                <p id="popout-text">Placeholder</p>
                <div class="h-stack" style="width: 100%; gap: 10px;">
                    <button id="popout-left" class="secondary-btn">Placeholder</button>
                    <button id="popout-right" class="primary-btn">Placeholder</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
