<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Roll Call</title>
</head>
<body class="gray-bg">
    <div id="app">
        <!-- Login View -->
        <section id="login-view" class="view">
            <div class="card login-card">
                <h1>糾察人員登入</h1>
                <p class="subtitle">進入點名掃描系統</p>
                <div class="form-group">
                    <label>使用者名稱</label>
                    <input type="text" id="username" placeholder="請輸入使用者名稱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼">
                </div>
                <button id="login-btn" class="primary-btn">登入</button>
                <p id="login-error" class="error-text"></p>
            </div>
        </section>

        <!-- Main View (Scanner) -->
        <section id="main-view" class="view" style="display: none;">
            <header class="glass-header">
                <div class="header-top">
                    <button id="disconnect-btn" class="icon-btn">
                        <span id="disconnect-img" class="material-symbols-outlined">logout</span>
                    </button>
                    <div class="connection-status">
                        <div id="status-dot" class="dot disconnected"></div>
                        <span id="status-text">未連接</span>
                    </div>
                    <div id="battery-info" class="battery-info" style="display: flex;">
                        <span class="material-symbols-outlined">battery_full</span>
                        <span id="battery-level">--</span>%
                    </div>
                    <button id="refresh-btn" class="icon-btn" title="重新載入資料">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>
                
                <div class="bus-selector-container">
                    <label>目標車次:</label>
                    <select id="bus-select">
                        <option value="">請選擇車次</option>
                    </select>
                </div>
            </header>

            <main class="content">
                <!-- Ready State -->
                <div id="ready-state" class="empty-state">
                    <div class="rfid-icon">
                        <span class="material-symbols-outlined">sensors</span>
                    </div>
                    <h2>準備掃描</h2>
                    <p>請將卡片靠近掃描器</p>
                    <button id="connect-ble-btn" class="primary-btn pulse">連接掃描器</button>
                    <div id="status-message-ready" class="status-message" style="margin-top: 20px; color: red;"></div>
                </div>

                <!-- Student Card -->
                <div id="student-card" class="student-card" style="display: none;">
                    <div class="photo-container">
                        <img id="student-photo" src="">
                        <div id="photo-loading" class="spinner" style="display: none;"></div>
                    </div>
                    <div class="student-details">
                        <h2 id="student-name">--</h2>
                        <div class="detail-row">
                            <span class="content-text">學號:</span>
                            <strong id="student-badge">--</strong>
                        </div>
                        <div class="detail-row">
                            <span class="content-text">班級:</span>
                            <strong id="student-class">--</strong>
                        </div>
                        <div class="detail-row">
                            <span class="content-text"># UID:</span>
                            <strong id="student-uid">--</strong>
                        </div>
                        <div id="student-bus" class="bus-badge">--</div>
                    </div>
                    
                    <div id="status-message" class="status-message"></div>
                </div>
            </main>

            <!-- Bottom Action -->
            <footer id="sync-footer" style="display: none;">
                <button id="review-btn" class="sync-btn">
                    <span class="material-symbols-outlined">list_alt</span>
                    <span>預覽與同步</span>
                    <span id="pending-count" class="badge-count">0</span>
                </button>
            </footer>
        </section>

        <!-- Review Sheet (Modal) -->
        <div id="review-sheet" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <button id="close-review" class="text-btn">取消</button>
                    <h3>點名記錄預覽</h3>
                    <div class="review-bus-selector">
                        <select id="review-bus-select">
                            <option value="">請選擇車次</option>
                        </select>
                    </div>
                </div>
                <div id="review-summary" class="review-summary">
                    <!-- Summary text will be injected here -->
                </div>
                <div id="review-list" class="review-list">
                    <!-- Pending scans list -->
                </div>
                <div class="modal-footer">
                    <button id="sync-now-btn" class="primary-btn success">
                        確認並上傳至伺服器
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>正在取得學生資料...</p>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
